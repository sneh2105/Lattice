# Scan agent code and configs in PRs automatically.
# GitHub-native: triggers on every PR, comments findings, uploads SARIF to the Security tab.
name: Lattice Security Scan

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for SARIF upload
      pull-requests: write     # required to comment on the PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for `git diff` against the base branch

      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}

      # Not yet on PyPI — install from this repo directly.
      # Once published: replace with `pip install agentscan`.
      - run: pip install -e .

      - name: Doctor -- confirm what Lattice can see in this repo
        run: agentscan doctor .

      - name: Scan the full checkout (source code, not just changed files)
        run: |
          agentscan source . --output sarif --output-file results.sarif || true

      - name: Scan any changed YAML/JSON agent configs
        if: github.event_name == 'pull_request'
        run: |
          set +o pipefail
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(yaml|yml|json)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed YAML/JSON agent configs in this PR -- skipping."
          else
            echo "$CHANGED" | xargs -I{} agentscan agent {} --output sarif --output-file scan-{}.sarif || true
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "."
        if: always()

      - name: Generate HTML report as a workflow artifact
        run: agentscan source . --output html --output-file report.html || true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: agentscan-report
          path: report.html
        if: always()
