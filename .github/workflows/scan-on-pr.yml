# Scan agent configs in PRs automatically
name: AgentScan PR Check

on:
  pull_request:
    paths:
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install agentscan

      - name: Scan changed agent configs
        run: |
          git diff --name-only origin/main...HEAD | \
            grep -E '\.(yaml|yml|json)$' | \
            xargs -I{} agentscan agent {} --output sarif --output-file scan-{}.sarif || true

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "*.sarif"
        if: always()
